name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1.6.0
        with:
          neovim: true

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Install mini.nvim
        run: just deps

      - name: Run tests
        run: just test
